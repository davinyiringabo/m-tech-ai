services:
  db:
    image: pgvector/pgvector:pg16
    container_name: minetech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minetech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minetech}
      POSTGRES_DB: ${POSTGRES_DB:-minetech}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - minetech_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minetech} -d ${POSTGRES_DB:-minetech}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: minetech-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_URL: postgres://${POSTGRES_USER:-minetech}:${POSTGRES_PASSWORD:-minetech}@db:5432/${POSTGRES_DB:-minetech}
      # Ollama runs on the host machine, not in Docker.
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      RAG_TOP_K: ${RAG_TOP_K:-4}
      RAG_MIN_SIMILARITY: ${RAG_MIN_SIMILARITY:-0.35}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    # Lets the container reach the host's Ollama (also works on Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time; the browser hits the host.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    container_name: minetech-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  minetech_pgdata:
