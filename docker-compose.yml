services:
  db:
    image: pgvector/pgvector:pg16
    container_name: minetech-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: minetech
      POSTGRES_PASSWORD: minetech
      POSTGRES_DB: minetech
    ports:
      - "5432:5432"
    volumes:
      - minetech_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minetech -d minetech"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  minetech_pgdata:
